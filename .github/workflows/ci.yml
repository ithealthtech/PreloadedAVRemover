name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore .\tests\PreloadedAVRemover.Tests\PreloadedAVRemover.Tests.csproj
      - name: Build application
        run: dotnet build .\PreloadedAVRemover.csproj -c Release --no-restore
      - name: Verify formatting
        run: dotnet format .\tests\PreloadedAVRemover.Tests\PreloadedAVRemover.Tests.csproj --verify-no-changes --no-restore
      - name: Test
        run: dotnet test .\tests\PreloadedAVRemover.Tests\PreloadedAVRemover.Tests.csproj -c Release --no-restore --logger "trx;LogFileName=tests.trx"
      - name: UI layout self-test
        run: dotnet .\bin\Release\net8.0-windows\PreloadedAVRemover.dll --self-test
      - name: Verify portable publish
        run: dotnet publish .\PreloadedAVRemover.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o .\publish-ci
      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests\PreloadedAVRemover.Tests\TestResults\tests.trx
          if-no-files-found: warn
          retention-days: 14
